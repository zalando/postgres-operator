  label: "Patroni API Check Interval"
- variable: configTimeouts.patroni_api_check_timeout
  default: "5s"
  description: "Timeout when waiting for successful response from Patroni API"
  type: string
  group: "Timeouts"
  label: "Patroni API Check Timeout"
- variable: configTimeouts.pod_deletion_wait_timeout
  default: "10m"
  description: "Timeout when waiting for the Postgres pods to be deleted"
  type: string
  group: "Timeouts"
  label: "Pod Deletion Wait Timeout"
- variable: configTimeouts.pod_label_wait_timeout
  default: "10m"
  description: "Timeout when waiting for pod role and cluster labels"
