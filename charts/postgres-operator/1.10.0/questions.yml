  group: "Timeouts"
  label: "Pod Label Wait Timeout"
- variable: configTimeouts.ready_wait_interval
  default: "3s"
  description: "Interval between consecutive attempts waiting for postgresql CRD to be created"
  type: string
  group: "Timeouts"
  label: "Ready Wait Interval"
- variable: configTimeouts.ready_wait_timeout
  default: "30s"
  description: "Timeout for the complete postgres CRD creation"
