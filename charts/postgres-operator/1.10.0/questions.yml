  label: Enable Replica Load Balancer
- variable: configLoadBalancer.enable_replica_pooler_load_balancer
  default: false
  description: "Toggles service type load balancer pointing to the replica pooler pod of the cluster"
  type: boolean
  group: Load Balancer
  label: Enable Replica Pooler Load Balancer
- variable: configLoadBalancer.external_traffic_policy
  default: Cluster
  description: "Define external traffic policy for the load balancer"
  type: enum
  options:
    - Cluster
    - Local
